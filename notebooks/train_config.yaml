# Description: Experiment Configuration
---
id: sample # if empty, a unique id will be generated by datetime
root_folder: 'experiments-results/' # root folder for saving experiment data
# Data parameters
data:
  data_loader: 'SampleDataLoader'
  survey_data_path: 'data/sample'
  labels:
    - 'teff'
    - 'logg'
  cond_labels:
    - 'teff'
  normalize_spectra: False
  shuffle: False
  discretize: True
  nbins: 10
  seed: 42
# Model parameters
models:
  # Autoencoder parameters
  encoder_hidden_layer_sizes: [512, 256]
  decoder_hidden_layer_sizes: [256, 512]
  latent_size: 25
  input_without_params: False
  batch_norm: False
  # Discriminator parameters
  multi_disc: False
  disc_hidden_layer_sizes: [64, 32]
  conv_disc: False
train:
  epochs: 5
  batch_size: 64
  lambda_values: [0.001] # lambda values for each cond_label
  lr_disc : 0.001
  lr_ae: 0.001
  # Dynamic lambda parameters (optional)
  dl_no_change:
  dl_lambda_steps: